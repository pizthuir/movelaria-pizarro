<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Pizarro Movelaria</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #F5F0E8;
      --wood:    #8B5E3C;
      --dark:    #1E1410;
      --mid:     #4A3728;
      --accent:  #C4864A;
      --light:   #D4C4B0;
      --white:   #FDFAF5;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--cream);
    }

    /* ── background ── */
    .bg {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 80% 50%, #3a2010 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 10% 20%, #2a1a0a 0%, transparent 60%),
        var(--dark);
    }

    /* wood-grain texture via repeating lines */
    .bg::before {
      content: '';
      position: fixed; inset: 0;
      background-image: repeating-linear-gradient(
        92deg,
        transparent 0px,
        transparent 18px,
        rgba(139,94,60,.06) 18px,
        rgba(139,94,60,.06) 19px
      );
      pointer-events: none;
    }

    /* ── split layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* left panel */
    .brand-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 5rem;
      border-right: 1px solid rgba(196,134,74,.2);
      animation: fadeLeft .8s ease both;
    }

    .brand-tag {
      font-size: .7rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2.5rem;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 5vw, 5rem);
      line-height: 1.05;
      color: var(--white);
      margin-bottom: .5rem;
    }

    .brand-name span {
      color: var(--accent);
    }

    .brand-sub {
      font-size: .85rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 3rem;
    }

    .brand-divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin-bottom: 2rem;
    }

    .brand-quote {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--light);
      line-height: 1.7;
      max-width: 320px;
    }

    /* decorative corner piece */
    .corner {
      position: absolute;
      bottom: 2.5rem; left: 4rem;
      width: 60px; height: 60px;
      border-left: 1px solid rgba(196,134,74,.4);
      border-bottom: 1px solid rgba(196,134,74,.4);
    }

    /* right panel */
    .form-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem 3rem;
      animation: fadeRight .8s .15s ease both;
    }

    .form-box {
      width: 100%;
      max-width: 380px;
    }

    .form-header {
      margin-bottom: 2.5rem;
    }

    .form-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--white);
      margin-bottom: .4rem;
    }

    .form-header p {
      font-size: .85rem;
      color: var(--light);
      font-weight: 300;
    }

    /* field */
    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: .72rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: .5rem;
    }

    .field input {
      width: 100%;
      padding: .85rem 1rem;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(196,134,74,.25);
      border-radius: 4px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      outline: none;
      transition: border-color .25s, background .25s, box-shadow .25s;
    }

    .field input::placeholder { color: rgba(212,196,176,.35); }

    .field input:focus {
      border-color: var(--accent);
      background: rgba(196,134,74,.07);
      box-shadow: 0 0 0 3px rgba(196,134,74,.12);
    }

    /* password wrapper */
    .pw-wrap { position: relative; }

    .pw-toggle {
      position: absolute;
      right: .9rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; padding: 0;
      color: var(--light);
      opacity: .6;
      transition: opacity .2s;
      display: flex; align-items: center;
    }
    .pw-toggle:hover { opacity: 1; }

    /* row: remember + forgot */
    .extras {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.1rem 0 1.75rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .8rem;
      color: var(--light);
      cursor: pointer;
    }

    .remember input[type=checkbox] {
      accent-color: var(--accent);
      width: 14px; height: 14px;
      cursor: pointer;
    }

    .forgot {
      font-size: .8rem;
      color: var(--accent);
      text-decoration: none;
      transition: opacity .2s;
    }
    .forgot:hover { opacity: .7; }

    /* submit */
    .btn-login {
      width: 100%;
      padding: .95rem;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .25s, transform .15s, box-shadow .25s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background .2s;
    }

    .btn-login:hover {
      background: #d4935a;
      box-shadow: 0 8px 24px rgba(196,134,74,.35);
      transform: translateY(-1px);
    }

    .btn-login:active { transform: translateY(0); }

    /* register */
    .register-row {
      text-align: center;
      margin-top: 2rem;
      font-size: .83rem;
      color: var(--light);
    }

    .register-row a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: opacity .2s;
    }
    .register-row a:hover { opacity: .7; }

    /* decorative dots */
    .dots {
      position: absolute;
      top: 2.5rem; right: 2.5rem;
      display: grid;
      grid-template-columns: repeat(4, 6px);
      gap: 6px;
      opacity: .25;
    }
    .dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* animations */
    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeRight {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* responsive */
    @media (max-width: 700px) {
      .page { grid-template-columns: 1fr; }
      .brand-panel { display: none; }
      .form-panel { padding: 3rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="page">
    <!-- LEFT -->
    <div class="brand-panel" style="position:relative;">
      <p class="brand-tag">Bem-vindo de volta</p>
      <h1 class="brand-name">Pizarro<br><span>Movelaria</span></h1>
      <p class="brand-sub">Móveis sob medida · Desde 1998</p>
      <div class="brand-divider"></div>
      <p class="brand-quote">"Cada peça conta uma história. Cada espaço merece um mobiliário à sua altura."</p>
      <div class="corner"></div>
    </div>

    <!-- RIGHT -->
    <div class="form-panel" style="position:relative;">
      <div class="dots">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="form-box">
        <div class="form-header">
          <h2>Entrar</h2>
          <p>Acesse sua conta para continuar</p>
        </div>

        {% if erro %}
        <div style="background:rgba(180,60,60,.15);border:1px solid rgba(180,60,60,.35);border-radius:4px;padding:.7rem 1rem;font-size:.82rem;color:#e08080;margin-bottom:1.2rem;">
          {{ erro }}
        </div>
        {% endif %}

        <form method="POST">
          <div class="field">
            <label for="user">Usuário</label>
            <input id="user" name="user" type="text" placeholder="Seu usuário" autocomplete="username" required />
          </div>

          <div class="field">
            <label for="senha">Senha</label>
            <div class="pw-wrap">
              <input id="senha" name="senha" type="password" placeholder="Sua senha" autocomplete="current-password" required />
              <button type="button" class="pw-toggle" aria-label="Mostrar/ocultar senha" onclick="togglePw()">
                <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="extras">
            <label class="remember">
              <input type="checkbox" name="lembrar" />
              Lembrar-me
            </label>
            <a href="/forgot" class="forgot">Esqueci a senha</a>
          </div>

          <button type="submit" class="btn-login">Entrar</button>
        </form>

        <p class="register-row">
          Ainda não tem conta? <a href="/register">Criar conta</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('senha');
      const icon  = document.getElementById('eye-icon');
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      icon.innerHTML = showing
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }
  </script>
</body>
</html>
