<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    Dashboard Inteligente
</header>

<div class="container">

    <div class="card">
        <h3>Economia Total</h3>
        <h2 style="color:#ffd700;">R$ {{economia}}</h2>
    </div>

    <div class="card">
        <h3>Uso de Sobras</h3>
        <p>{{usados}} usadas / {{disponiveis}} disponíveis</p>
        <p>{{porcentagem}}% aproveitamento</p>
    </div>

    <div class="card">
        <h3>Ranking Funcionários</h3>

        {% for nome, qtd in ranking.items() %}
            <p>{{nome}} - {{qtd}} peças</p>
        {% endfor %}
    </div>

</div>

</body>
</html>
